<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Better YouTube</title>
    <script src="popup.js" defer></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f5ef;
        --card: #ffffff;
        --text: #1c1b18;
        --muted: #6b645b;
        --accent: #ff6a3d;
        --shadow: 0 10px 30px rgba(35, 26, 17, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        width: 280px;
        max-width: 300px;
        font-family: "Georgia", "Times New Roman", serif;
        background: radial-gradient(circle at top, #fff7e9 0%, var(--bg) 55%);
        color: var(--text);
      }

      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 16px;
        box-shadow: var(--shadow);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .logo {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        background: linear-gradient(135deg, #ffd1a8, #ff6a3d);
        display: grid;
        place-items: center;
        font-size: 18px;
      }

      .title {
        font-size: 18px;
        margin: 0;
        letter-spacing: 0.2px;
      }

      .subtitle {
        margin: 4px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .guidance {
        margin: 12px 0 0;
        font-size: 12px;
        line-height: 1.4;
        color: var(--muted);
        background: #fff3e6;
        border-radius: 10px;
        padding: 10px 12px;
      }

      .toggle-row {
        margin-top: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        background: #fff8ef;
      }

      .toggle-label {
        font-size: 14px;
        font-weight: 600;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #d7cfc3;
        transition: 0.2s ease;
        border-radius: 999px;
      }

      .slider::before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.2s ease;
        border-radius: 50%;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      }

      input:checked + .slider {
        background-color: var(--accent);
      }

      input:checked + .slider::before {
        transform: translateX(20px);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <div class="logo" aria-hidden="true">BY</div>
        <div>
          <p class="title">Better YouTube</p>
          <p class="subtitle">Hide Shorts and extend playback speed</p>
        </div>
      </div>

      <p class="guidance">
        Extended playback speeds (0.1x to 5x) are available in the player. If
        YouTube shows a load error, turn off the Shorts filter, reload the page,
        then turn it back on.
      </p>

      <div class="toggle-row">
        <span class="toggle-label">Shorts filter</span>
        <label class="switch" aria-label="Toggle Shorts filter">
          <input id="shorts-toggle" type="checkbox" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">Hide Explore</span>
        <label class="switch" aria-label="Toggle Explore section">
          <input id="explore-toggle" type="checkbox" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">Hide More from YouTube</span>
        <label class="switch" aria-label="Toggle More from YouTube sections">
          <input id="more-from-youtube-toggle" type="checkbox" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">Hide Home topic tabs</span>
        <label class="switch" aria-label="Toggle Home topic tabs">
          <input id="home-tabs-toggle" type="checkbox" />
          <span class="slider"></span>
        </label>
      </div>
    </main>
  </body>
</html>
